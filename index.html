<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тест X2H-2203</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #111827;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 500px;
        background: #1f2937;
        border-radius: 24px;
        padding: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    h1 {
        margin-top: 0;
        text-align: center;
    }

    .subtitle {
        text-align: center;
        color: #9ca3af;
        margin-bottom: 25px;
    }

    button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        font-size: 17px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 15px;
    }

    button:active {
        transform: scale(0.98);
    }

    .status {
        background: #111827;
        border-radius: 14px;
        padding: 15px;
        margin-top: 10px;
        word-break: break-word;
    }

    .device {
        background: #064e3b;
        border-radius: 14px;
        padding: 15px;
        margin-top: 15px;
        display: none;
    }

    .services {
        background: #0f172a;
        border-radius: 14px;
        padding: 15px;
        margin-top: 15px;
        max-height: 300px;
        overflow-y: auto;
        display: none;
    }

    .service {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #374151;
    }

    .characteristic {
        color: #9ca3af;
        font-size: 14px;
        margin-top: 5px;
    }

    .error {
        color: #fca5a5;
    }

    .success {
        color: #86efac;
    }
</style>
</head>

<body>

<div class="container">

    <h1>🖨️ X2H-2203</h1>

    <div class="subtitle">
        Тест подключения через Web Bluetooth
    </div>

    <button onclick="checkBluetooth()">
        🔍 Проверить Bluetooth
    </button>

    <button onclick="connectPrinter()">
        🔵 Найти Bluetooth-принтер
    </button>

    <div id="status" class="status">
        Статус: ожидание проверки...
    </div>

    <div id="device" class="device">
        <b>Устройство найдено!</b>
        <br><br>
        Название:
        <span id="deviceName">Неизвестно</span>
    </div>

    <div id="services" class="services">
        <b>Найденные GATT-сервисы:</b>
        <div id="servicesList"></div>
    </div>

</div>

<script>

let bluetoothDevice = null;
let bluetoothServer = null;

function setStatus(text, type = "") {

    const status = document.getElementById("status");

    status.className = "status " + type;

    status.innerHTML = text;
}


// Проверяем поддержку Web Bluetooth

async function checkBluetooth() {

    if (!navigator.bluetooth) {

        setStatus(
            "❌ Web Bluetooth недоступен.<br><br>" +
            "Попробуй открыть эту страницу в Chrome на Android " +
            "через HTTPS.",
            "error"
        );

        return;
    }

    try {

        const available =
            await navigator.bluetooth.getAvailability();

        if (available) {

            setStatus(
                "✅ Web Bluetooth доступен!<br><br>" +
                "Теперь нажми «Найти Bluetooth-принтер».",
                "success"
            );

        } else {

            setStatus(
                "⚠️ Bluetooth сейчас недоступен.",
                "error"
            );

        }

    } catch (error) {

        setStatus(
            "⚠️ Не удалось проверить Bluetooth:<br>" +
            error.message,
            "error"
        );

    }
}


// Поиск устройства

async function connectPrinter() {

    if (!navigator.bluetooth) {

        setStatus(
            "❌ Этот браузер не поддерживает Web Bluetooth.",
            "error"
        );

        return;
    }

    try {

        setStatus(
            "🔍 Открываю выбор Bluetooth-устройства..."
        );

        // Ищем все BLE-устройства.
        // Это тестовый режим.

        bluetoothDevice =
            await navigator.bluetooth.requestDevice({

                acceptAllDevices: true,

                optionalServices: []

            });


        document.getElementById("device").style.display = "block";

        document.getElementById("deviceName").textContent =
            bluetoothDevice.name ||
            "Без названия";


        setStatus(
            "✅ Устройство выбрано.<br>" +
            "Пробуем подключиться..."
        );


        // Проверяем, есть ли GATT

        if (!bluetoothDevice.gatt) {

            setStatus(
                "⚠️ Устройство выбрано, но GATT недоступен.",
                "error"
            );

            return;
        }


        // Подключаемся

        bluetoothServer =
            await bluetoothDevice.gatt.connect();


        setStatus(
            "✅ Подключение установлено!<br><br>" +
            "Получаем список сервисов...",
            "success"
        );


        // Получаем доступные сервисы

        const services =
            await bluetoothServer.getPrimaryServices();


        const servicesContainer =
            document.getElementById("services");

        const servicesList =
            document.getElementById("servicesList");


        servicesList.innerHTML = "";


        if (services.length === 0) {

            servicesList.innerHTML =
                "⚠️ GATT-сервисы не найдены.";

        }


        for (const service of services) {

            const serviceElement =
                document.createElement("div");

            serviceElement.className =
                "service";


            serviceElement.innerHTML =
                "<b>Service:</b><br>" +
                service.uuid;


            try {

                const characteristics =
                    await service.getCharacteristics();


                for (const characteristic
                    of characteristics) {

                    const characteristicElement =
                        document.createElement("div");

                    characteristicElement.className =
                        "characteristic";


                    characteristicElement.innerHTML =
                        "↳ Characteristic:<br>" +
                        characteristic.uuid +
                        "<br>" +
                        "Свойства: " +
                        characteristic.properties
                            .write ? "WRITE " : "" +
                        characteristic.properties
                            .writeWithoutResponse
                            ? "WRITE WITHOUT RESPONSE "
                            : "" +
                        characteristic.properties
                            .read ? "READ " : "" +
                        characteristic.properties
                            .notify ? "NOTIFY" : "";


                    serviceElement.appendChild(
                        characteristicElement
                    );

                }

            } catch (error) {

                const errorElement =
                    document.createElement("div");

                errorElement.className =
                    "characteristic error";

                errorElement.textContent =
                    "Не удалось получить характеристики.";

                serviceElement.appendChild(
                    errorElement
                );

            }


            servicesList.appendChild(
                serviceElement
            );

        }


        servicesContainer.style.display =
            "block";


        setStatus(
            "🎉 X2H-2203 подключён!<br><br>" +
            "Теперь нам нужно посмотреть найденные " +
            "GATT-сервисы и характеристики.",
            "success"
        );


    } catch (error) {

        console.error(error);


        setStatus(
            "❌ Ошибка подключения:<br><br>" +
            error.name +
            "<br>" +
            error.message,
            "error"
        );

    }

}

</script>

</body>
</html>
